name: Build CV PDF

on:
  push:
    branches: [ "main" ]
    paths:
      - "cv/**"
      - ".github/workflows/build-cv.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-fonts-recommended

      - name: Build PDF
        run: |
          cd cv
          latexmk -pdf -interaction=nonstopmode -halt-on-error cv.tex
            
      - name: Copy PDF with a friendly name
        run: |
          cp cv/cv.pdf cv/Chi_Xiao_CV.pdf

      - name: Commit PDF back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv/cv.pdf cv/Chi_Xiao_CV.pdf
          git diff --cached --quiet || git commit -m "Update CV PDF [skip ci]"
          git push
